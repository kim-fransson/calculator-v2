<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="hsl(222, 26%, 31%)" />

  <!-- Row 1: 3 number keys (light gray) -->
  <rect x="4" y="4" width="6" height="6" rx="1.5" fill="hsl(30, 25%, 89%)" />
  <rect x="13" y="4" width="6" height="6" rx="1.5" fill="hsl(30, 25%, 89%)" />
  <rect x="22" y="4" width="6" height="6" rx="1.5" fill="hsl(30, 25%, 89%)" />

  <!-- Row 2: 2 number keys + 1 operator key -->
  <rect x="4" y="13" width="6" height="6" rx="1.5" fill="hsl(30, 25%, 89%)" />
  <rect x="13" y="13" width="6" height="6" rx="1.5" fill="hsl(30, 25%, 89%)" />
  <rect x="22" y="13" width="6" height="6" rx="1.5" fill="hsl(225, 21%, 49%)" />

  <!-- Row 3: 1 operator key + 1 number key + 1 red equals key -->
  <rect x="4" y="22" width="6" height="6" rx="1.5" fill="hsl(225, 21%, 49%)" />
  <rect x="13" y="22" width="6" height="6" rx="1.5" fill="hsl(30, 25%, 89%)" />
  <rect x="22" y="22" width="6" height="6" rx="1.5" fill="hsl(6, 63%, 50%)" />
</svg>
